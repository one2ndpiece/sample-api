apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sample-api
  labels:
    app.kubernetes.io/name: sample-api
    app.kubernetes.io/part-of: sample-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-api
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 5s

